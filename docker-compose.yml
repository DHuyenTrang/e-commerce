services:
  postgres:
    image: postgres:15-alpine
    container_name: ecom_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: gateway_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d gateway_db"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - ecom_network
    restart: unless-stopped

  api_gateway:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: ecom_api_gateway
    working_dir: /app/api_gateway
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: gateway_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      USERS_SERVICE_URL: http://user_service:8001
      STAFF_SERVICE_URL: http://staff_service:8002
      PRODUCTS_SERVICE_URL: http://product_service:8003
      CART_SERVICE_URL: http://cart_service:8004
      ORDERS_SERVICE_URL: http://order_service:8005
      PAYMENTS_SERVICE_URL: http://payment_service:8006
      SHIPPING_SERVICE_URL: http://shipping_service:8007
      AI_SERVICE_URL: http://ai_service:8008
      COMMENTS_SERVICE_URL: http://comment_service:8009
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      user_service:
        condition: service_started
      staff_service:
        condition: service_started
      product_service:
        condition: service_started
      cart_service:
        condition: service_started
      order_service:
        condition: service_started
      payment_service:
        condition: service_started
      shipping_service:
        condition: service_started
      comment_service:
        condition: service_started
    networks:
      - ecom_network
    restart: unless-stopped

  user_service:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: ecom_user_service
    working_dir: /app/user_service
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8001"
    environment:
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: user_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecom_network
    restart: unless-stopped

  staff_service:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: ecom_staff_service
    working_dir: /app/staff_service
