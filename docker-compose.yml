    environment:
      DJANGO_ALLOWED_HOSTS: "*"
      POSTGRES_DB: staff_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "8002:8002"
